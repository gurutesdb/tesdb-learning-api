spring:
  application:
    name: tesdb-learning-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.tesdb.learning: DEBUG